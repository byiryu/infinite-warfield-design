const mix=(c,a)=>`color-mix(in srgb, ${c} ${a}%, transparent)`;
function drawParts(c){let s='';for(let i=0;i<16;i++){s+=`<span class="pt" style="left:${4+Math.random()*92}%;top:${28+Math.random()*64}%;background:${c};animation-delay:${(Math.random()*3).toFixed(1)}s"></span>`}parts.innerHTML=s;}
function render(){
  const h=HEROES[sel];
  ov.style.background=`radial-gradient(ellipse at 50% 68%, ${mix(h.c,42)}, transparent 58%), linear-gradient(180deg, ${mix(h.c,14)}, transparent 36%)`;

      d.style.transform=`translate(-50%,-50%) translateX(${P[0]}cqw) scale(${P[1]}) rotateY(${P[2]}deg)`;d.style.zIndex=6-Math.abs(off);d.style.opacity=off===0?1:(Math.abs(off)===1?.72:.34);}
