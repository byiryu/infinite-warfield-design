<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>infinite-warfield — MainHub v2 (DS v1.1 clean-sheet)</title>
<style>
/* =====================================================================
   MainHub clean-sheet mockup v2 — DS v1.1
   값 SoT = data/design-tokens.json. 16:9 · cqw(1cqw = frame_w/100 = 1920 논리px 캔버스의 19.2px).
   ★ 엔진정합(§3): UITK USS엔 box-shadow/blur/gradient/filter 미지원.
     - 배경 그라디언트 = 아트(일러) 레이어 stand-in (프로덕션 = background-image PNG) → OK
     - box-shadow(골드 글로우) = '베이크드 글로우 스프라이트' stand-in (프로덕션 = 자식 VisualElement PNG)
     - backdrop-filter blur = '반투명 솔리드' stand-in (프로덕션 = surface_glass 알파 필, 실 blur 아님)
     - ★v2 currency filter(saturate/brightness/drop-shadow) = '아웃라인+채도 베이크드 스프라이트' stand-in
   나머지 깊이 = 테두리(gold_frame) + 하단 짙은 라인 + scrim + 알파 필 (전부 UITK-정합).
   ---------------------------------------------------------------------
   v2 변경(창업자 결정4 + 검증7):
   D1 카드 상단 컬러바 = 스테이지 테마색 일관 → peek 3장 전부 Combat 빨강(--theme-combat).
   D2 아이콘 중복 제거 → 테마 글리프(빨간 A)는 초상 뱃지 1곳만. 이름옆/헤더/카드art/카드바디 제거.
      초상 = 현재 편성 덱의 '출전 영웅'(태그로 명시).
   D3 전투시작 CTA = 중앙-하단 유지(무변경).
   D4 알림 뱃지 = --badge-alert (faction_enemy 아님).
   V-peek 겹침↓(overlap -1.0cqw·카드폭↓·peek폭↑) → 인접 스테이지 번호 온전.
   V-safe 좌우 인셋 --safe-x(=sp-xxl 32px) → 헤더/사이드레일 화면끝 밀착 해소.
   V-artnote '일러 씬 (Combat)' 제거(영문괄호 어색) → 카드명(화염 협곡)이 라벨.
   V-threat 위협 1칩 + 카운터 추천 1칩(threat_*↔feedback_effective).
   V-hier 위계: (1행)영웅명+Lv+출전영웅태그 ↔ (2행)플레이어명(지휘관 카이)+환생레벨.
   V-currency 크리스털 저대비 → 다크 sunken 백킹 + rim + 채도/아웃라인 보정.
   ---------------------------------------------------------------------
   v2 추가확정 3건(창업자):
   A1 스테이지 = 순차번호(무한 로테이션) → "3-7/구역3/5" 폐기 → 카드 127·이웃 126/128·헤더 '화염 지대 · 127'.
   A2 초상 Lv = 영웅(유닛) 스탯 강화레벨(플레이어X)·이름옆 Lv.24. 스킬강화 집계 = 초상 우하단 골드 +N 뱃지(--cta-gold·Lv텍스트와 시각분리). 플레이어명 별도 행.
      → 테마 글리프(빨간 A) = 초상 '우상단'으로 이동(우하단은 골드 +N 전용). 초상 뱃지 2종=상이정보(중복 아님).
   A3 ∞N = 환생 레벨(글로벌) → 루프 글리프 + '환생 12' 라벨(플레이어 행·의미 명확).
   ===================================================================== */
* { margin:0; padding:0; box-sizing:border-box; }
:root{
  /* --- color (design-tokens.json) --- */
  --panel-chrome:#161F2B; --panel-deep:#0F1620; --dark-bg:#0D1117; --dark-panel:#141B22;
  --gold-frame:#B89B5E; --cta-gold:#FFD24D; --cta-gold-deep:#F0992D; --cta-glyph-ink:#4A2C05; --icon-cream:#F3E6C4;
  --meta-base:#E7ECF2; --meta-ink:#15212E; --stroke-subtle:#33404F; --text-muted:#8FA0B4;
  --currency-theme:#D6A63A; --currency-silver:#C6D2DE;
  --theme-combat:#E03A5C; --theme-necro:#9D3EE8; --theme-spirit:#5DDD7E; --theme-beast:#E06B14; --theme-machine:#00D4FF;
  --threat-fortress:#8AB4FF; --threat-swarm:#F5C842; --threat-ranged:#C08DFF; --threat-debuffer:#8FCF4A; --threat-boss:#FF5E55;
  --feedback-effective:#8AE05A; --faction-friendly:#4FA3FF; --faction-enemy:#FF5B5B;
  --badge-alert:#E0433A;                     /* ★v2 신규 — 알림 뱃지 전용(적색≠전투 적) */
  /* surface aliases (base+alpha) */
  --surface-panel:#161F2B9E; --surface-sunken:#0D11179E; --surface-chip:#121C2880; --surface-glass:#E7ECF273;
  --surface-scrim:#0000008C; --surface-arrow:#10171773; --surface-pressed:#0F1620E0;
  /* --- type ramp (px@1080 -> cqw /19.2) --- */
  --t-micro:1.667cqw; --t-caption:1.979cqw; --t-body:2.292cqw; --t-label:2.552cqw;
  --t-subtitle:3.125cqw; --t-title:3.75cqw; --t-display:4.792cqw;
  /* --- icon --- */
  --ic-sm:2.083cqw; --ic-md:2.708cqw; --ic-lg:2.917cqw;
  /* --- space --- */
  --sp-xs:.208cqw; --sp-sm:.417cqw; --sp-md:.625cqw; --sp-lg:.833cqw; --sp-xl:1.25cqw; --sp-xxl:1.667cqw;
  --safe-x:1.667cqw;                          /* ★v2 좌우 세이프 인셋(=sp-xxl 32px≥24px·노치/홈바) */
  --chip-py:.417cqw; --chip-px:1.042cqw;      /* 표시칩 패딩(§비터치칩 y8·x20) */
  /* --- radius --- */
  --r-sm:.313cqw; --r-md:.521cqw; --r-lg:.729cqw; --r-xl:1.146cqw; --r-round:999px;
  /* --- control --- */
  --h-cta:9.01cqw; --h-primary:7.813cqw; --h-standard:6.615cqw; --h-bar:8.125cqw;
  --pad-cta:2.292cqw; --pad-primary:1.667cqw; --pad-standard:1.354cqw; --gap-ic:.833cqw;
  --touch-min:6.615cqw;
}
html,body{ height:100%; background:#05070a; font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR",sans-serif; }
.stage{ width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
.frame{
  width:min(100vw, calc(100vh * 16 / 9)); aspect-ratio:16/9;
  container-type:size; position:relative; overflow:hidden;
  background:var(--dark-bg); color:var(--meta-base);
  -webkit-font-smoothing:antialiased;
}
.hidden-defs{ position:absolute; width:0; height:0; }
.ic{ width:1em; height:1em; display:inline-block; fill:currentColor; flex:none; }

/* ---------- ART LAYER (일러 테마 씬 stand-in · Combat/화염 협곡) ---------- */
.bg{ position:absolute; inset:0;
  background:
    radial-gradient(130% 85% at 50% 112%, rgba(224,58,92,.30), rgba(224,107,20,.12) 38%, transparent 60%),
    radial-gradient(80% 55% at 22% 8%, rgba(224,58,92,.10), transparent 55%),
    radial-gradient(90% 60% at 50% -12%, rgba(9,12,16,.92), transparent 55%),
    linear-gradient(180deg,#0b0e13 0%,#0d1117 46%,#140a0c 100%);
}
.bg::after{ /* vignette (아트 stand-in) */ content:""; position:absolute; inset:0;
  background:radial-gradient(120% 120% at 50% 42%, transparent 55%, rgba(0,0,0,.55));
}
.scrim-top{ position:absolute; top:0; left:0; right:0; height:16cqw; pointer-events:none;
  background:linear-gradient(180deg, rgba(6,9,13,.72), transparent); }
.scrim-bot{ position:absolute; bottom:0; left:0; right:0; height:22cqw; pointer-events:none;
  background:linear-gradient(0deg, rgba(6,9,13,.80), transparent); }

/* ---------- TOP BAR (지휘관 좌 · 재화 우 — 단일 툴바로 높이/프레임/톤 통일) ---------- */
.topbar{ position:absolute; top:0; left:0; right:0; height:var(--h-bar);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 var(--safe-x); gap:var(--sp-lg);                     /* ★v2 세이프 인셋 */
  background:var(--surface-panel); border-bottom:.104cqw solid var(--gold-frame);
  z-index:20;
}
/* 지휘관(유저정보) — 초상=출전 영웅 / 영웅Lv+스킬강화 뱃지 / 플레이어명·환생레벨 위계 */
.cmdr{ display:flex; align-items:center; gap:var(--sp-lg); }   /* ★v2 gap↑ = 초상 골드 +N 뱃지 여유 */
.cmdr-port{ position:relative; width:6.0cqw; height:6.0cqw; flex:none; }
/* ★v2 .pic = 이미지 클립 전용(overflow:hidden) → 뱃지는 port 직속(비클립·코너 poke 가능) */
.cmdr-port .pic{ position:absolute; inset:0; border-radius:var(--r-lg); overflow:hidden;
  background:var(--dark-panel); border:.13cqw solid var(--gold-frame);
  box-shadow:inset 0 -.4cqw .9cqw rgba(224,58,92,.22); }
.cmdr-port .pic img{ width:118%; height:118%; object-fit:contain; object-position:center 92%;
  image-rendering:pixelated; margin:-9% 0 0 -9%; }
/* ★v2/A2 테마 글리프(빨간 A·유일) = 우상단으로 이동 */
.badge-theme{ position:absolute; right:.15cqw; top:.15cqw; width:1.9cqw; height:1.9cqw;
  background:rgba(9,12,16,.9); border:.08cqw solid var(--gold-frame); border-radius:var(--r-round);
  display:flex; align-items:center; justify-content:center; color:var(--theme-combat); z-index:2; }
.badge-theme .ic{ font-size:1.25cqw; }
/* ★v2/A2 스킬강화 집계 = 우하단 골드 +N 뱃지(Lv 텍스트와 시각분리·--cta-gold) */
.badge-skill{ position:absolute; right:-.35cqw; bottom:-.35cqw; min-width:2.3cqw; height:2.0cqw; padding:0 .35cqw;
  background:var(--cta-gold); border:.11cqw solid var(--panel-chrome); border-radius:var(--r-md);
  display:flex; align-items:center; justify-content:center; color:var(--cta-glyph-ink);
  font-size:var(--t-micro); font-weight:900; letter-spacing:-.01em; z-index:2; }
.cmdr-txt{ display:flex; flex-direction:column; justify-content:center; gap:.25cqw; }
.cmdr-l1{ display:flex; align-items:baseline; gap:var(--sp-sm); }
.cmdr-hero{ font-size:var(--t-label); font-weight:800; color:var(--meta-base); letter-spacing:-.01em; }
.cmdr-lv{ font-size:var(--t-caption); font-weight:700; color:var(--icon-cream); letter-spacing:-.01em; } /* 영웅 스탯 강화레벨 */
.hero-tag{ font-size:var(--t-micro); font-weight:700; color:var(--text-muted); letter-spacing:.02em;
  padding:.1cqw var(--sp-sm); border-radius:var(--r-sm); align-self:center;
  background:var(--surface-chip); border:.06cqw solid var(--stroke-subtle); }
.cmdr-l2{ display:flex; align-items:center; gap:var(--sp-sm); }
.cmdr-role{ font-size:var(--t-caption); font-weight:600; color:var(--text-muted); }
.cmdr-name{ font-size:var(--t-caption); font-weight:800; color:var(--meta-base); }   /* 플레이어명 */
.reborn{ display:inline-flex; align-items:center; gap:.25cqw; margin-left:var(--sp-xs);
  padding:.15cqw var(--sp-sm); border-radius:var(--r-md);
  background:var(--surface-chip); border:.08cqw solid var(--gold-frame); color:var(--cta-gold); }
.reborn .ic{ font-size:1.35cqw; }
.reborn b{ font-size:var(--t-micro); font-weight:800; letter-spacing:.01em; }

/* 재화 (우상단·다이제틱) — ★v2 크리스털 저대비 보정(백킹+rim+채도/아웃라인) */
.wallet{ display:flex; align-items:center; gap:var(--sp-md); }
.chip{ display:inline-flex; align-items:center; gap:var(--sp-sm);
  padding:var(--chip-py) var(--sp-lg); border-radius:var(--r-xl);   /* ★ 앵귤러 — 완전 pill 금지 */
  background:var(--surface-chip); border:.104cqw solid var(--gold-frame); }
.cur-ic{ width:2.9cqw; height:2.9cqw; flex:none; display:flex; align-items:center; justify-content:center;
  background:var(--surface-sunken); border:.06cqw solid var(--stroke-subtle); border-radius:var(--r-sm); }
.cur-ic img{ width:2.5cqw; height:2.5cqw; image-rendering:pixelated;
  filter:saturate(1.2) brightness(1.08); }                        /* stand-in: 채도 보정 */
.cur-ic.frag img{ filter:saturate(1.4) brightness(1.2)
  drop-shadow(.05cqw .05cqw 0 #05070a) drop-shadow(-.05cqw -.05cqw 0 #05070a); } /* 저대비 크리스털 = 아웃라인+채도 stand-in */
.chip .amt{ font-size:var(--t-label); font-weight:700; color:var(--meta-base); font-variant-numeric:tabular-nums; }

/* ---------- SIDE RAILS (좌: 강화/환생/도감 · 우: 미션/업적/상점) ---------- */
.rail{ position:absolute; top:var(--h-bar); bottom:0; display:flex; flex-direction:column;
  justify-content:center; gap:var(--sp-lg); z-index:15; }
.rail-l{ left:var(--safe-x); align-items:flex-start; }             /* ★v2 세이프 인셋 */
.rail-r{ right:var(--safe-x); align-items:flex-end; }
.mbtn{ position:relative; display:flex; align-items:center; gap:var(--gap-ic);
  width:12.6cqw; height:var(--h-primary); padding:0 var(--pad-primary);
  background:var(--surface-glass); border:.13cqw solid var(--gold-frame); border-radius:var(--r-xl);
  backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px);   /* stand-in: 프로덕션 = 반투명 솔리드 */
  cursor:pointer; }
.mbtn .ic{ font-size:var(--ic-md); color:var(--meta-ink); flex:none; }
.mbtn .lb{ font-size:var(--t-label); font-weight:800; color:var(--meta-ink); letter-spacing:-.01em; }
/* 뱃지 IA (design-system §2) — ★v2 --badge-alert */
.badge-dot{ position:absolute; top:-.4cqw; right:-.4cqw; width:1.15cqw; height:1.15cqw;
  border-radius:var(--r-round); background:var(--badge-alert); border:.16cqw solid var(--panel-chrome); }
.badge-num{ position:absolute; top:-.55cqw; right:-.55cqw; min-width:1.9cqw; height:1.9cqw; padding:0 .35cqw;
  border-radius:var(--r-round); background:var(--badge-alert); border:.16cqw solid var(--panel-chrome);
  display:flex; align-items:center; justify-content:center; color:var(--icon-cream);
  font-size:var(--t-micro); font-weight:800; }

/* ---------- CENTER STAGE ZONE (스테이지 선택 + 정보) ---------- */
.zone{ position:absolute; top:var(--h-bar); left:15cqw; right:15cqw; bottom:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:1.4cqw; padding-bottom:16cqw; z-index:10; }   /* padding-bottom = CTA 분리 예약(캐러셀↔CTA 간격 확보) */
/* 구역 헤더 = 상단 툴바 중앙 타이틀(§2-R2 [back|title|actions]) — ★v2 테마 글리프 제거·색만 유지 */
.bar-title{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  display:inline-flex; align-items:baseline; gap:var(--sp-sm); }
.bar-title .b-theme{ font-size:var(--t-label); font-weight:800; color:var(--theme-combat); letter-spacing:-.01em; }
.bar-title .b-sep{ font-size:var(--t-body); color:var(--stroke-subtle); }
.bar-title .b-zone{ font-size:var(--t-body); font-weight:600; color:var(--text-muted); }

/* 코버플로우 */
.coverflow{ display:flex; align-items:center; justify-content:center; }
.arrow{ width:var(--touch-min); height:var(--touch-min); flex:none;
  display:flex; align-items:center; justify-content:center; border-radius:var(--r-round);
  background:var(--surface-arrow); border:.13cqw solid var(--gold-frame); color:var(--icon-cream);
  z-index:6; cursor:pointer; backdrop-filter:blur(1.5px); }
.arrow .ic{ font-size:3.2cqw; }
.arrow-l{ margin-right:-1.0cqw; }     /* ★v2 겹침↓ */
.arrow-r{ margin-left:-1.0cqw; }

/* peek 카드(측면·dim) — ★v2 폭↑·겹침↓·상단바 전부 Combat(D1) */
.peek{ width:12cqw; height:14.6cqw; flex:none; border-radius:var(--r-lg); overflow:hidden;
  background:var(--surface-panel); border:.104cqw solid var(--stroke-subtle);
  border-top:.5cqw solid var(--theme-combat);      /* ★D1 동일 테마색 */
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:var(--sp-md);
  opacity:.44; z-index:2; }
.peek-l{ margin-right:-1.0cqw; }       /* ★v2 겹침 -2.6→-1.0 (번호 온전) */
.peek-r{ margin-left:-1.0cqw; }
.peek .p-id{ font-size:var(--t-title); font-weight:900; color:var(--meta-base); }
.peek .ic{ font-size:2.4cqw; }
.peek.locked .p-id{ color:var(--text-muted); }
.peek .statrow{ display:flex; align-items:center; gap:var(--sp-xs); color:var(--text-muted); font-size:var(--t-caption); }
.peek .statrow .star-on{ color:var(--cta-gold); }
.peek .statrow b{ font-size:var(--t-body); font-weight:800; color:var(--meta-base); }

/* 현재 스테이지 카드 (지배적·스테이지 정보 수용·선택 어포던스) */
.card{ position:relative; width:19.5cqw; z-index:5; border-radius:var(--r-lg); overflow:hidden;
  background:var(--dark-panel); border:.16cqw solid var(--gold-frame);
  box-shadow:0 0 2.8cqw rgba(255,210,77,.30);   /* stand-in: 베이크드 골드 글로우(선택 강조) */
  display:flex; flex-direction:column; }
.card-accent{ height:.6cqw; background:var(--theme-combat); }   /* ★D1 테마 액센트 */
.card-art{ position:relative; height:9.5cqw; overflow:hidden;
  background:
    radial-gradient(120% 120% at 50% 118%, rgba(224,58,92,.42), rgba(224,107,20,.14) 42%, transparent 66%),
    linear-gradient(180deg,#171016,#0f0a0d); }
.card-art .stage-id{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:var(--t-display); font-weight:900; color:var(--meta-base); letter-spacing:-.02em;
  text-shadow:0 .2cqw .6cqw rgba(0,0,0,.6); }    /* ★v2 theme-ic·artnote 제거(중복·영문괄호) */
.card-body{ padding:var(--sp-lg) var(--sp-lg) var(--sp-lg); display:flex; flex-direction:column; gap:var(--sp-md); }
.card-name{ font-size:var(--t-subtitle); font-weight:800; color:var(--meta-base); letter-spacing:-.01em; }
/* 위협(1) → 카운터 추천(1) */
.tacline{ display:flex; flex-direction:column; gap:var(--sp-sm); }
.tchip{ display:inline-flex; align-items:center; align-self:flex-start; gap:var(--sp-sm);
  padding:var(--chip-py) var(--chip-px); border-radius:var(--r-md); }
.tchip .tk{ font-size:var(--t-micro); font-weight:800; letter-spacing:.03em; }
.tchip .tn{ font-size:var(--t-caption); font-weight:700; color:var(--meta-base); }
.tchip .tdot{ width:.85cqw; height:.85cqw; border-radius:var(--r-round); flex:none; }
.tchip.threat{ background:var(--surface-chip); border:.08cqw solid var(--stroke-subtle); }
.tchip.threat .tk{ color:var(--text-muted); }
.tchip.counter{ background:transparent; border:.08cqw solid var(--stroke-subtle); }
.tchip.counter .tk{ color:var(--feedback-effective); }
.tchip.counter .tdot{ background:var(--feedback-effective); }
.stars{ display:flex; align-items:center; gap:var(--sp-sm); justify-content:center; margin-top:var(--sp-xs);
  padding-top:var(--sp-md); border-top:.08cqw solid var(--stroke-subtle); }
.stars .ic{ font-size:var(--ic-lg); }
.stars .on{ color:var(--cta-gold); }
.stars .off{ color:var(--stroke-subtle); }

/* dots */
.dots{ display:flex; align-items:center; gap:var(--sp-md); margin-top:var(--sp-sm); }
.dots i{ display:block; border-radius:var(--r-round); background:var(--stroke-subtle); }
.dots i.s{ width:.55cqw; height:.55cqw; }
.dots i.m{ width:.8cqw; height:.8cqw; background:var(--text-muted); }
.dots i.cur{ width:1.15cqw; height:1.15cqw; background:var(--cta-gold); }

/* ---------- 주 CTA (전투 시작 · 지배적 · 중앙-하단 유지 D3) ---------- */
.cta{ position:absolute; left:50%; bottom:3.4cqw; transform:translateX(-50%);
  display:flex; align-items:center; justify-content:center; gap:var(--gap-ic);
  height:var(--h-cta); min-width:19cqw; padding:0 var(--pad-cta);
  background:var(--cta-gold); border:.19cqw solid var(--icon-cream); border-radius:var(--r-xl);
  box-shadow:0 0 3.4cqw rgba(255,210,77,.45), 0 .5cqw 1.4cqw rgba(0,0,0,.4);  /* stand-in: 베이크드 골드 글로우 */
  z-index:18; cursor:pointer; }
.cta .ic{ font-size:var(--ic-lg); color:var(--cta-glyph-ink); }
.cta .lb{ font-size:var(--t-subtitle); font-weight:900; color:var(--cta-glyph-ink); letter-spacing:.01em; }

/* watermark */
.wm{ position:absolute; left:var(--safe-x); bottom:var(--sp-sm); font-size:1.1cqw; color:#4a5a6e; z-index:30;
  font-weight:600; letter-spacing:.02em; }
</style></head>
